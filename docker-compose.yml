services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: swiftpos
      POSTGRES_PASSWORD: swiftpos
      POSTGRES_DB: swiftpos
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftpos"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: swiftpos:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://swiftpos:swiftpos@db:5432/swiftpos
      JWT_SECRET: change-this-to-a-secure-random-string

volumes:
  pgdata:
